services:
  db:
    image: postgres:16-alpine
    container_name: panariapos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: panariapos
      POSTGRES_PASSWORD: panariapos123
      POSTGRES_DB: panariapos_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U panariapos" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: panariapos_redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"

  api:
    build:
      context: ./panariapos-api
      dockerfile: Dockerfile
    container_name: panariapos_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://panariapos:panariapos123@db:5432/panariapos_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: su-secreto-aqui # Cambia esto por algo seguro
      PORT: 3001
      NODE_ENV: production
      # ESTA ES LA LÍNEA QUE FALTABA:
      FRONTEND_URL: https://panariapos.jacana-dev.com
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3101:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panariapos_frontend
    restart: unless-stopped
    environment:
      # Y ESTA OTRA LÍNEA TAMBIÉN:
      NEXT_PUBLIC_API_URL: https://panariapos.jacana-dev.com/api/v1
    depends_on:
      - api
    ports:
      - "3100:3000"

volumes:
  pgdata:
  redisdata:
