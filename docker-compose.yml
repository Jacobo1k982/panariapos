services:
  db:
    image: postgres:16-alpine
    container_name: panariapos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: panariapos
      POSTGRES_PASSWORD: panariapos123
      POSTGRES_DB: panariapos_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U panariapos" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: panariapos_redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"

volumes:
  pgdata:
  redisdata:
